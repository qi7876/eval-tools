[run_eval]
prepared_root = "../../prepared_data"
protocol = "main"
artifacts_root = "../../artifacts/runs"
run_name = "offline-predictions-demo"
model_name = "my-offline-model"
predictions = "../../artifacts/my_model_predictions.jsonl"
oracle_predictions = "../../artifacts/my_model_oracle_predictions.jsonl"
chain_manifest = "../../artifacts/chain_pairs.jsonl"
enable_oracle_track = false
enable_bertscore = false
commentary_unsupported = false

[judge]
backend = "openai"
base_url = "http://your-judge-endpoint/v1"
api_key_env = "EVAL_JUDGE_API_KEY"
model = "gpt-4.1-mini"
temperature = 0.0
top_p = 1.0
top_k = 1
max_tokens = 256
n = 1
seed = 42
invalid_json_retries = 2
