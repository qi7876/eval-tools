[run_eval]
prepared_root = "/data/public_data/mllmbenchmark_prepared"
protocol = "main"
artifacts_root = "../../artifacts/runs"
prompt_root = "../../prompts/benchmark_v1"
run_name = "baseline-main"
model_name = "your-model-name"
adapter = "your_package.adapters.video:YourVideoAdapter"
chain_manifest = "../../artifacts/chain_pairs.jsonl"
enable_oracle_track = true
oracle_prompt_root = "../../prompts/benchmark_oracle_v1"
# For model-native sampling, copy this file and replace `main` with the same
# protocol spec used during prepare-data, e.g. `your_package.protocols:YourNativeSamplingProtocol`.
# This example assumes prepared data was built with Oracle visual media enabled,
# e.g. via configs/examples/prepare_main.toml.

[judge]
backend = "openai"
prompt_root = "../../prompts/judge_v1"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key_env = "DASHSCOPE_API_KEY"
model = "qwen3.5-397b-a17b"
temperature = 0
invalid_json_retries = 2
concurrency = 1

[judge.extra_body]
enable_thinking = false

[structurer]
backend = "openai"
prompt_root = "../../prompts/structurer_v1"
oracle_prompt_root = "../../prompts/structurer_oracle_v1"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key_env = "DASHSCOPE_API_KEY"
model = "qwen3.5-397b-a17b"
temperature = 0
invalid_json_retries = 2
concurrency = 1

[structurer.extra_body]
enable_thinking = false
